name: Builder

on:
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  version-check:
    name: Version preflight (game-ci compatible) 🔎
    runs-on: ubuntu-latest
    outputs:
      buildVersion: ${{ steps.calc.outputs.version }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version (game-ci logic)
        id: calc
        run: |
          set -e
          echo "🔍 Fetching tags..."
          git fetch --tags

          LAST_TAG=$(git tag --list '[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)

          if [ -z "$LAST_TAG" ]; then
           echo "ℹ️ No tags found, using base 0.0.0"
           MAJOR=0
           MINOR=0
           LAST_PATCH=0
           COMMITS=$(git rev-list HEAD --count)
          else
           echo "ℹ️ Last tag: $LAST_TAG"

          # Парсим версию
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_TAG"

          # Если patch отсутствует — считаем 0
          if [ -z "$PATCH" ]; then
           PATCH=0
          fi

          LAST_PATCH=$PATCH

          # Количество коммитов после тега
          COMMITS=$(git rev-list "$LAST_TAG"..HEAD --count)
          fi

          NEW_PATCH=$((LAST_PATCH + COMMITS))
          VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "✅ Computed version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version
        run: |
          if [ -z "${{ steps.calc.outputs.version }}" ]; then
            echo "❌ Version is empty"
            exit 1
          fi

      - name: Check tag does not exist
        run: |
          if git rev-parse "v${{ steps.calc.outputs.version }}" >/dev/null 2>&1; then
            echo "❌ Tag v${{ steps.calc.outputs.version }} already exists!"
            exit 1
          fi

  build:
    name: Build Unity project 💪
    needs: version-check
    runs-on: ubuntu-latest
    outputs:
      buildVersion: ${{ needs.version-check.outputs.buildVersion }}

    steps:
      - name: Checkout repository 😶‍🌫️
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Cache Library 👾
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}

      - name: Build project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          allowDirtyBuild: true
          versioning: Custom
          customVersion: ${{ needs.version-check.outputs.buildVersion }}
          buildName: ${{ vars.GAME_NAME }}
          targetPlatform: StandaloneWindows64


      - name: Create zip
        uses: ihiroky/archive-action@v1
        with:
          root_dir: build
          file_path: build.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: build.zip

  release:
    name: Release & publish 🚀
    needs: build
    permissions: write-all
    environment: 
        name: Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: game-build

      - name: Create GitHub tag
        uses: rickstaa/action-create-tag@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag: ${{ needs.build.outputs.buildVersion }}
          tag_exists_error: false
          message: ${{ needs.build.outputs.buildVersion }}

      - name: Create GitHub release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.build.outputs.buildVersion }}
          release_name: Release v${{ needs.build.outputs.buildVersion }}
          draft: false
          prerelease: false

      - name: Upload build to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: build.zip
          asset_name: ${{ vars.GAME_NAME }}-win-v${{ needs.build.outputs.buildVersion }}.zip
          asset_content_type: application/zip

      - name: Upload to itch.io 🎮
        uses: yeslayla/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_CREDENTIALS }}
          ITCH_USER: ${{ vars.ITCH_USER }}
          ITCH_GAME: ${{ vars.ITCH_GAME }}
          CHANNEL: windows
          VERSION: ${{ needs.build.outputs.buildVersion }}
          PACKAGE: build.zip
